[build]
  publish = "public"
  command = "hugo --gc --minify"

  [build.environment]
    HUGO_VERSION = "0.141.0"

[context.production.environment]
  HUGO_ENV           = "production"
  HUGO_ENABLEGITINFO = "true"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

# Redirects for pages that moved when the site switched to the Popular theme.
[[redirects]]
  from   = "/handbook/ways-to-participate/speak/"
  to     = "/speak/"
  status = 301

[[redirects]]
  from   = "/handbook/ways-to-participate/host/"
  to     = "/host/"
  status = 301

[[redirects]]
  from   = "/handbook/ways-to-participate/donate/"
  to     = "/donate/"
  status = 301

[[redirects]]
  from   = "/handbook/ways-to-participate/help-organize/"
  to     = "/organize/"
  status = 301

[[redirects]]
  from   = "/handbook/ways-to-participate/"
  to     = "/handbook/"
  status = 301

[[redirects]]
  from   = "/handbook/templates/luma-event-template/"
  to     = "/runbooks/#luma-event-template"
  status = 301

[[redirects]]
  from   = "/handbook/templates/"
  to     = "/runbooks/"
  status = 301

[[redirects]]
  from   = "/handbook/organizing-a-meetup/*"
  to     = "/runbooks/"
  status = 301
