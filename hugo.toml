        url = "/about/"
      [[params.footer.columns.links]]
        label = "Blog"
        url = "/blog/"
      [[params.footer.columns.links]]
        label = "Code of Conduct"
        url = "https://www.pyladies.com/CodeOfConduct/"
    [[params.footer.columns]]
      title = "Get involved"
      [[params.footer.columns.links]]
        label = "Get involved"
        url = "/get-involved/"
      [[params.footer.columns.links]]
        label = "Speak at our meetup"
        url = "/speak/"
      [[params.footer.columns.links]]
        label = "Donate"
